# ============================================================
# render.yaml – Render.com Native Node.js Deployment
# No Docker – Render manages the Node runtime directly.
# ============================================================

services:
  - type: web
    name: bitespeed-identity-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: "npm ci && npx prisma generate && npm run build"
    startCommand: "node dist/index.js"
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100
